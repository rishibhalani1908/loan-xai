<!DOCTYPE html>
<html>
<head>
    <title>Loan AI Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family:'Poppins',sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        .container {
            max-width:900px;
            margin:40px auto;
            padding:20px;
        }

        h1 {
            text-align:center;
            margin-bottom:30px;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding:20px;
            border-radius:15px;
            backdrop-filter: blur(10px);
            margin-bottom:20px;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        .inputs input {
            width:22%;
            padding:10px;
            margin:10px 1%;
            border:none;
            border-radius:8px;
        }

        .btn {
            padding:12px 20px;
            border:none;
            border-radius:8px;
            background: linear-gradient(45deg,#ff6ec4,#7873f5);
            color:white;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .approved {
            color:#00ff9d;
            font-size:22px;
        }

        .rejected {
            color:#ff4d4d;
            font-size:22px;
        }

        .meter {
            height:15px;
            background:#ddd;
            border-radius:10px;
            overflow:hidden;
            margin:10px 0;
        }

        .meter-fill {
            height:100%;
            background: linear-gradient(90deg,#00ff9d,#00c9ff);
            width:0%;
            transition:1s;
        }

        .section-title {
            margin-top:10px;
            font-weight:600;
        }

        ul {
            padding-left:20px;
        }

        .logout {
            float:right;
            background:#ff4d4d;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💰 AI Loan Approval System</h1>

    <button class="btn logout" onclick="logout()">Logout</button>

    <!-- INPUT CARD -->
    <div class="card inputs">
        <input type="number" id="age" placeholder="Age">
        <input type="number" id="income" placeholder="Income">
        <input type="number" id="credit" placeholder="Credit Score">
        <input type="number" id="loan" placeholder="Loan Amount">

        <br>
        <button class="btn" onclick="checkLoan()">Check Eligibility</button>
    </div>

    <!-- RESULT CARD -->
    <div class="card" id="resultCard" style="display:none;">
        <h2 id="status"></h2>
        <p id="statement"></p>

        <div class="section-title">Approval Confidence</div>
        <div class="meter">
            <div class="meter-fill" id="meterFill"></div>
        </div>

        <div class="section-title">Reasons</div>
        <ul id="reasons"></ul>

        <div class="section-title">Suggestions</div>
        <ul id="suggestions"></ul>
    </div>

</div>

<script>

function logout(){
    window.location.href="/logout";
}

function checkLoan(){
    let age=document.getElementById("age").value;
    let income=document.getElementById("income").value;
    let credit=document.getElementById("credit").value;
    let loan=document.getElementById("loan").value;

    fetch('/predict',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({age,income,credit,loan})
    })
    .then(res=>res.json())
    .then(data=>{

        document.getElementById("resultCard").style.display="block";

        let statusClass = data.status==="Approved" ? "approved" : "rejected";

        document.getElementById("status").className=statusClass;
        document.getElementById("status").innerText=data.status;

        document.getElementById("statement").innerText=data.statement;

        // Meter animation
        let percent = parseFloat(data.statement.match(/(\d+\.?\d*)/)[0]);
        document.getElementById("meterFill").style.width = percent + "%";

        // Reasons
        let rList = document.getElementById("reasons");
        rList.innerHTML="";
        data.reasons.forEach(r=>{
            let li=document.createElement("li");
            li.innerText=r;
            rList.appendChild(li);
        });

        // Suggestions
        let sList = document.getElementById("suggestions");
        sList.innerHTML="";
        data.suggestions.forEach(s=>{
            let li=document.createElement("li");
            li.innerText=s;
            sList.appendChild(li);
        });

    });
}

</script>

</body>
</html>
